<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blážova šifra</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
            color: #e0e0e0;
            font-family: 'Plasma Drip BRK';
            overflow-x: hidden;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            color: #ff4500;
            text-shadow: 0 0 10px rgba(255, 69, 0, 0.8);
            margin-bottom: 30px;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #c0c0c0;
        }
        .mystical-box {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ff4500;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.5);
            margin-top: 50px;
        }
        .btn-mystical {
            background: #ff4500;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-mystical:hover {
            background: #e03e00;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.8);
        }
        .footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Blážova šifra</h1>
        
        <div class="mystical-box">
            <p>Zadejte šifru pro odhalení tajemství:</p>
            <form method="POST">
                <input type="text" name="sifra" placeholder="Zadej Šifru" class="form-control mb-3">
                <button type="submit" class="btn btn-mystical">Odeslat Šifru</button>
            </form>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
